<svg viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1526"/>
      <stop offset="100%" stop-color="#060c18"/>
    </linearGradient>
    <linearGradient id="spl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#88c0d0" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#88c0d0"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#88c0d0"/>
      <stop offset="100%" stop-color="#88c0d0" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="pL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2d4a"/>
      <stop offset="100%" stop-color="#0f1e35"/>
